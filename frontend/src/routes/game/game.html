<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🕳️ BLACKHOLE - Game</title>
    <link rel="stylesheet" href="game.css">
</head>

<body>
<header class="game-header">
    <div class="player-info">
        <span id="player-name">Player</span>
        <span class="badge" id="player-badge">Novice</span>
        <span class="level">Level: <span id="level">1</span></span>
    </div>

    <button id="back-menu-btn">Back to Menu</button>
</header>

<main class="game-main">

    <h1> BLACKHOLE</h1>
    <div class="game-area">
        <p>The game will begin here...</p>
    </div>

    <div class="score-box">
        Evaluation points: <span id="evaluation-points">0</span>
    </div>
</main>

<script src="game.js"></script>
</body>
</html>
