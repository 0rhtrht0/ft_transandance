<div class="gameover">
    <div class="vignette" aria-hidden="true"></div>
    <aside id="achievement-popup" class="achievement-popup hidden" aria-live="polite"></aside>

    <section class="gameover-panel">
        <p class="kicker" id="transmission-lost">TRANSMISSION LOST</p>
        <h1 id="gameover-title" data-text="ABSORBED">ABSORBED</h1>

        <div id="result-summary" class="result-summary hidden"></div>
        <p id="line" class="hidden"></p>
        <div id="gameover-actions" class="gameover-actions hidden">
            <button id="restart-btn" type="button">Restart</button>
            <button id="quit-btn" type="button">Quit</button>
        </div>
    </section>
</div>
